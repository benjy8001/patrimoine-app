services:

    phpfpm:
        container_name: '${APP_NAME}'
        build:
            args:
                user: '${WWWUSER}'
                uid: '${WWWGROUP}'
                GIT_PRIV_KEY: '${GIT_PRIV_KEY}'
            context: ./docker
            dockerfile: Dockerfile
        restart: unless-stopped
        working_dir: /var/www/html
        environment:
            COMPOSER_AUTH: "${COMPOSER_AUTH}"
        volumes:
            - ./:/var/www/html
        networks:
            - app_network
        depends_on:
            - mariadb

    nginx:
        image: nginx:latest
        networks:
            - app_network
        ports:
            - '127.0.0.1:${APP_PORT:-80}:80'
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./:/var/www/html/
        restart: unless-stopped

    redis:
        image: 'redis:alpine'
        volumes:
            - 'redis_volume:/data'
        networks:
            - app_network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s
        restart: unless-stopped

    mariadb:
        image: mariadb:latest
        restart: unless-stopped
        ports:
            - '127.0.0.1:${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'mariadb_volume:/var/lib/mysql'
        networks:
            - app_network
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping" ]

    mailhog:
        restart: unless-stopped
        image: mailhog/mailhog
        networks:
            - app_network
networks:
    app_network:
        driver: bridge

volumes:
    mariadb_volume:
        driver: local
    redis_volume:
        driver: local
    meilisearch:
        driver: local
